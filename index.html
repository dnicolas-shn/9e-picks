<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit Schedule Organizer</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 10px; background: #f0f2f5; color: #1e293b; }
  .header-container { display: flex; flex-direction: column; gap: 10px; border-bottom: 1px solid #ddd; padding-bottom: 15px; margin-bottom: 15px; }
  .top-row { display: flex; gap: 10px; flex-wrap: wrap; }
  
  .name-bar { display:flex; flex-wrap:wrap; gap:8px; justify-content:flex-start; margin-bottom:15px; min-height: 45px; }
  .name-btn { padding:8px 14px; border:1px solid #ccc; border-radius:20px; background:white; color: #334155; cursor:pointer; transition: 0.2s; font-weight: 500; }
  .name-btn.active-user { background: #007bff; color: white; border-color: #0056b3; box-shadow: 0 0 0 3px rgba(0,123,255,0.3); font-weight: 700; }
  .name-btn.completed { border-style: double; border-width: 3px; border-color: #eab308; }
  .name-btn.register { background:#28a745; color:white; border-color:#28a745; font-weight: 700; }
  
  .active-label { font-size: 12px; color: #007bff; font-weight: bold; margin-bottom: 5px; display: block; }
  
  .calendar-wrapper { overflow-x: auto; padding-bottom: 10px; width: 100%; }
  .calendar { display: grid; grid-template-columns: repeat(7, minmax(140px, 1fr)); gap: 48px 10px; min-width: 1000px; padding-top: 15px; }
  @media (min-width: 1200px) { .calendar { grid-template-columns: repeat(14, minmax(125px, 1fr)); min-width: 1800px; } }
  
  .day { border: 1px solid #ddd; padding: 8px; border-radius: 8px; min-height: 200px; display: flex; flex-direction: column; background: white; }
  .date-title { font-weight:bold; font-size:14px; color: #333; margin-bottom: 4px; border-bottom:1px solid #eee; padding-bottom:4px; }
  .day.is-weekend { background: #fefce8; border-color: #fef08a; }
  
  .slot { border:1px solid #eee; padding:6px; background:#f8f9fa; margin-bottom:5px; border-radius:4px; cursor:pointer; font-size:11px; transition: 0.2s; height: 28px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; user-select: none; }
  .slot.filled { background:#cbd5e1; color:#334155; border-color:#94a3b8; cursor: not-allowed; }
  .slot.filled.mine { background:#007bff; color:white; border-color:#0056b3; cursor: pointer; }
  
  .tables-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 40px; }
  @media (max-width: 800px) { .tables-container { grid-template-columns: 1fr; } }
  
  .data-section { padding: 20px; background: white; border-radius: 12px; border: 1px solid #ddd; }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
  th, td { border: 1px solid #eee; padding: 8px; text-align: left; }
  th { background: #f8f9fa; color: #64748b; }
  
  .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #ef4444; color: white; padding: 12px 24px; border-radius: 50px; opacity: 0; transition: 0.3s; z-index: 10000; pointer-events: none; font-weight: bold; text-align: center; }
  .toast.show { opacity: 1; top: 30px; }
  
  .action-btn { padding: 8px 16px; border-radius: 6px; border: 1px solid #ddd; cursor: pointer; font-weight: bold; background: white; }
  .btn-download { background: #0f172a; color: white; border: none; }
</style>
</head>
<body>

<div class="header-container">
  <div class="top-row">
    <button class="action-btn btn-download" onclick="exportData()">Download</button>
    <button class="action-btn" style="color: #f97316" onclick="refineData()">Clear</button>
    <button class="action-btn" style="color: #ef4444" onclick="resetApp()">Reset</button>
    <button class="action-btn" style="color: #64748b" onclick="clearCache()">Clear Cache</button>
  </div>
  <p style="font-size: 11px; color: #64748b; margin: 0;"><strong>Rule:</strong> Weekends (Sat/Sun) must be picked as a pair. One click fills/clears both.</p>
</div>

<span class="active-label" id="statusLabel">NO ACTIVE NURSE - SELECT NAME BELOW</span>
<div class="name-bar" id="nameBar">
  <button class="name-btn register" onclick="addStaffPrompt()">+ Add Staff Member</button>
</div>

<h2 id="headerTitle">Schedule Canvas</h2>
<div class="calendar-wrapper"><div class="calendar" id="calendar"></div></div>

<div class="tables-container">
  <div class="data-section">
    <h3>Staff List</h3>
    <table id="staffTable">
      <thead><tr><th>Name</th><th>Shifts</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
  <div class="data-section">
    <h3>Export Preview</h3>
    <table id="dataTable">
      <thead><tr><th>Date</th><th>Slot</th><th>Name</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SLOTS = ["Charge", "Day", "Day", "Day", "Night", "Night"];
const START_DATE = "2024-05-13"; 
const DAYS_COUNT = 42;

let currentUser = null;
let staffList = JSON.parse(localStorage.getItem('org_staff')) || [];
let shiftsData = JSON.parse(localStorage.getItem('org_shifts')) || [];

function init() {
  renderNames();
  buildCalendar();
  shiftsData.forEach(s => applyUI(s.date, s.slotId, s.slotName, s.name, true));
  updateTables();
}

function buildCalendar() {
  const container = document.getElementById("calendar");
  container.innerHTML = "";
  const start = new Date(START_DATE.replace(/-/g, '/'));
  for (let i = 0; i < DAYS_COUNT; i++) {
    const dt = new Date(start.getFullYear(), start.getMonth(), start.getDate() + i);
    const dayOfWeek = dt.getDay(); // 0=Sun, 6=Sat
    const ds = dt.toISOString().split('T')[0];
    const cell = document.createElement("div");
    cell.className = "day" + (dayOfWeek === 0 || dayOfWeek === 6 ? " is-weekend" : "");
    cell.innerHTML = `<div class="date-title">${dt.toDateString().slice(0, 10)}</div>`;
    SLOTS.forEach((sn, idx) => {
      const el = document.createElement("div");
      el.className = "slot";
      el.textContent = sn;
      Object.assign(el.dataset, { date: ds, slotId: `${sn}-${idx}`, slotName: sn, owner: "" });
      el.onclick = () => handleAction(el);
      cell.appendChild(el);
    });
    container.appendChild(cell);
  }
}

function handleAction(el) {
  if (!currentUser) return toast("Select a nurse name first!", "#1e293b");
  const { date, slotName, owner } = el.dataset;

  const dt = new Date(date.replace(/-/g, '/'));
  const dayOfWeek = dt.getDay();
  const isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);
  const otherWeekendDay = (dayOfWeek === 6) ? getOffsetDate(dt, 1) : getOffsetDate(dt, -1);

  // 1. REMOVE LOGIC
  if (owner === currentUser) {
    if (isWeekend) {
        // Remove both Saturday and Sunday
        removeShift(date);
        removeShift(otherWeekendDay);
    } else {
        removeShift(date);
    }
    saveAndRefresh();
    return;
  }

  // 2. BLOCK TAKEN
  if (owner !== "") return toast(`❌ Taken by ${owner}.`, "#ef4444");

  // 3. WEEKEND PAIR LOGIC
  if (isWeekend) {
      // Check if user already has a shift on either day of the weekend
      const hasSat = shiftsData.find(s => s.name === currentUser && s.date === (dayOfWeek === 6 ? date : otherWeekendDay));
      const hasSun = shiftsData.find(s => s.name === currentUser && s.date === (dayOfWeek === 0 ? date : otherWeekendDay));

      if (hasSat || hasSun) return toast("❌ Weekend already picked. Clear it first to switch.");

      // Try to pick both
      const success1 = pickShift(date, slotName);
      if (success1) {
          const success2 = pickShift(otherWeekendDay, slotName); // Default same type for auto-pick
          if (!success2) {
              // Rollback if partner day is full
              removeShift(date);
              toast("❌ Partner weekend day is full!");
          }
      }
  } else {
      // STANDARD DAY PICK
      pickShift(date, slotName);
  }

  saveAndRefresh();
}

function removeShift(dateStr) {
    const shift = shiftsData.find(s => s.name === currentUser && s.date === dateStr);
    if (shift) {
        applyUI(shift.date, shift.slotId, shift.slotName, currentUser, false);
        shiftsData = shiftsData.filter(s => s !== shift);
    }
}

function pickShift(dateStr, preferredType) {
    const existing = shiftsData.find(s => s.name === currentUser && s.date === dateStr);
    if (existing) return false;

    // Gravity Logic: Find top slot of preferred type, or any slot of that type
    const available = Array.from(document.querySelectorAll(`.slot[data-date="${dateStr}"][data-slot-name="${preferredType}"]`))
        .find(s => s.dataset.owner === "");

    if (!available) return false;

    // Constraint Checks
    if (preferredType !== "Night" && checkNightTurnaround(dateStr)) return false;
    if (checkTypeLimit(dateStr, preferredType)) return false;
    if (checkGlobalLimit(dateStr)) return false;

    applyUI(dateStr, available.dataset.slotId, preferredType, currentUser, true);
    shiftsData.push({ date: dateStr, slotId: available.dataset.slotId, slotName: preferredType, name: currentUser });
    return true;
}

function saveAndRefresh() {
  localStorage.setItem('org_shifts', JSON.stringify(shiftsData));
  updateTables();
}

// CONSTRAINTS
function checkNightTurnaround(dateStr) {
    const prevDate = getOffsetDate(new Date(dateStr.replace(/-/g, '/')), -1);
    const hit = shiftsData.some(s => s.name === currentUser && s.date === prevDate && s.slotName === "Night");
    if (hit) toast("❌ Cannot pick Day after Night shift.");
    return hit;
}

function checkGlobalLimit(dateStr) {
    const hasShiftOn = (d) => shiftsData.some(s => s.name === currentUser && s.date === d);
    const date = new Date(dateStr.replace(/-/g, '/'));
    const offsets = [[-1,-2,-3,-4], [-1,-2,-3,+1], [-1,-2,+1,+2], [-1,+1,+2,+3], [+1,+2,+3,+4]];
    const hit = offsets.some(set => set.every(o => hasShiftOn(getOffsetDate(date, o))));
    if (hit) toast("❌ Max 4 shifts in a row.");
    return hit;
}

function checkTypeLimit(dateStr, type) {
    const isN = (type === "Night");
    const hasGroupOn = (d) => shiftsData.some(s => {
        if (s.name !== currentUser || s.date !== d) return false;
        return isN ? (s.slotName === "Night") : (s.slotName !== "Night");
    });
    const date = new Date(dateStr.replace(/-/g, '/'));
    const offsets = [[-1,-2,-3], [-1,-2,+1], [-1,+1,+2], [+1,+2,+3]];
    const hit = offsets.some(set => set.every(o => hasGroupOn(getOffsetDate(date, o))));
    if (hit) toast(`❌ Max 3 consecutive ${type}s.`);
    return hit;
}

function getOffsetDate(baseDate, offset) {
    const d = new Date(baseDate);
    d.setDate(d.getDate() + offset);
    return d.toISOString().split('T')[0];
}

function applyUI(ds, id, sn, name, isAdd) {
  const el = document.querySelector(`.slot[data-date="${ds}"][data-slot-id="${id}"]`);
  if (!el) return;
  if (isAdd) {
    el.textContent = `${sn}: ${name}`;
    el.classList.add("filled");
    el.dataset.owner = name;
    if (name === currentUser) el.classList.add("mine");
  } else {
    el.textContent = sn;
    el.classList.remove("filled", "mine");
    el.dataset.owner = "";
  }
  refreshNameCounts();
}

function renderNames() {
  const b = document.getElementById("nameBar");
  const regBtn = b.querySelector('.register');
  const label = document.getElementById("statusLabel");
  b.innerHTML = ""; b.appendChild(regBtn);
  staffList.sort().forEach(name => {
    const btn = document.createElement("button");
    btn.className = "name-btn" + (currentUser === name ? " active-user" : "");
    btn.textContent = name;
    btn.onclick = () => toggleUser(name);
    b.appendChild(btn);
  });
  if (currentUser) {
      label.textContent = "ACTIVE NURSE: " + currentUser.toUpperCase();
      label.style.color = "#007bff";
  } else {
      label.textContent = "NO ACTIVE NURSE - SELECT NAME BELOW";
      label.style.color = "#64748b";
  }
}

function toggleUser(name) {
  currentUser = (currentUser === name) ? null : name;
  renderNames();
  document.querySelectorAll('.slot').forEach(el => {
    el.classList.remove("mine");
    if(currentUser && el.dataset.owner === currentUser) el.classList.add("mine");
  });
}

function addStaffPrompt() {
    const n = prompt("Enter Full Name:");
    if (n && !staffList.includes(n)) {
        staffList.push(n);
        localStorage.setItem('org_staff', JSON.stringify(staffList));
        currentUser = n;
        renderNames();
        updateTables();
    }
}

function updateTables() {
  const tbody = document.querySelector("#dataTable tbody");
  tbody.innerHTML = "";
  shiftsData.sort((a,b) => a.date.localeCompare(b.date)).forEach(s => {
    const row = tbody.insertRow();
    row.innerHTML = `<td>${s.date}</td><td>${s.slotName}</td><td>${s.name}</td>`;
  });
  const sBody = document.querySelector("#staffTable tbody");
  sBody.innerHTML = "";
  staffList.sort().forEach(name => {
    const count = shiftsData.filter(s => s.name === name).length;
    const row = sBody.insertRow();
    row.innerHTML = `<td>${name}</td><td>${count}</td>`;
  });
}

function refreshNameCounts() {
  const counts = {};
  shiftsData.forEach(s => counts[s.name] = (counts[s.name] || 0) + 1);
  document.querySelectorAll('.name-btn:not(.register)').forEach(btn => {
    const n = btn.textContent; const c = counts[n] || 0;
    if (c >= 20) btn.classList.add('completed'); else btn.classList.remove('completed');
  });
}

function exportData() {
  let csv = "Date,Slot,Name\n";
  shiftsData.sort((a,b) => a.date.localeCompare(b.date)).forEach(s => csv += `${s.date},${s.slotName},${s.name}\n`);
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = window.URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.setAttribute('href', url);
  a.setAttribute('download', `Schedule_Export.csv`);
  a.click();
}

function refineData() { if(confirm("Clear all picks?")) { shiftsData = []; saveAndRefresh(); location.reload(); } }
function resetApp() { if(confirm("Hard Reset?")) { localStorage.clear(); location.reload(); } }
function clearCache() { if(confirm("Wipe all data and reload?")) { localStorage.clear(); window.location.href = window.location.pathname + "?v=" + Math.random(); } }

const toast = (m, bg = "#ef4444") => { const t = document.getElementById("toast"); t.style.background = bg; t.textContent = m; t.classList.add("show"); setTimeout(() => t.classList.remove("show"), 3500); };

document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
