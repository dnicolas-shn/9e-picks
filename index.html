<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit Schedule Organizer</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 10px; background: #f0f2f5; color: #1e293b; }
  .header-container { display: flex; flex-direction: column; gap: 10px; border-bottom: 1px solid #ddd; padding-bottom: 15px; margin-bottom: 15px; }
  .top-row { display: flex; gap: 10px; }
  
  .name-bar { display:flex; flex-wrap:wrap; gap:8px; justify-content:flex-start; margin-bottom:15px; }
  .name-btn { padding:8px 14px; border:1px solid #ccc; border-radius:20px; background:white; color: #334155; cursor:pointer; transition: 0.2s; font-weight: 500; }
  .name-btn.active-user { background: #007bff; color: white; border-color: #0056b3; box-shadow: 0 0 0 3px rgba(0,123,255,0.3); }
  .name-btn.completed { background: #fef08a; color: #713f12; border-color: #eab308; }
  .name-btn.register { background:#28a745; color:white; border-color:#28a745; font-weight: 700; }
  
  .user-status-card { display:none; background:white; padding:15px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.1); margin-bottom:20px; border-left: 5px solid #007bff; max-width: fit-content; }
  
  .calendar-wrapper { overflow-x: auto; padding-bottom: 10px; width: 100%; }
  .calendar { display: grid; grid-template-columns: repeat(7, minmax(140px, 1fr)); gap: 48px 10px; min-width: 1000px; padding-top: 15px; }
  @media (min-width: 1200px) { .calendar { grid-template-columns: repeat(14, minmax(125px, 1fr)); min-width: 1800px; } }
  
  .day { border: 1px solid #ddd; padding: 8px; border-radius: 8px; min-height: 200px; display: flex; flex-direction: column; background: white; }
  .date-title { font-weight:bold; font-size:14px; color: #333; margin-bottom: 4px; border-bottom:1px solid #eee; padding-bottom:4px; }
  
  .slot { border:1px solid #eee; padding:6px; background:#f8f9fa; margin-bottom:5px; border-radius:4px; cursor:pointer; font-size:11px; transition: 0.2s; height: 28px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .slot.filled { background:#cbd5e1; color:#334155; border-color:#94a3b8; cursor:not-allowed; }
  .slot.filled.mine { background:#007bff; color:white; border-color:#0056b3; }
  
  .modal { position:fixed; inset:0; background:rgba(0,0,0,.6); display:none; align-items: flex-start; justify-content:center; z-index:999; padding-top: 100px; }
  .modal-box { background:white; padding:25px; border-radius:12px; width:90%; max-width:350px; text-align: center; }
  #nameInput { width:100%; padding:12px; margin: 15px 0; border:2px solid #ddd; border-radius:8px; box-sizing:border-box; font-size: 16px; }
  
  .tables-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 40px; }
  @media (max-width: 800px) { .tables-container { grid-template-columns: 1fr; } }
  
  .data-section { padding: 20px; background: white; border-radius: 12px; border: 1px solid #ddd; }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
  th, td { border: 1px solid #eee; padding: 8px; text-align: left; }
  th { background: #f8f9fa; color: #64748b; }
  
  .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 12px 24px; border-radius: 50px; opacity: 0; transition: 0.3s; z-index: 10000; pointer-events: none; }
  .toast.show { opacity: 1; top: 30px; }
  
  .action-btn { padding: 8px 16px; border-radius: 6px; border: 1px solid #ddd; cursor: pointer; font-weight: bold; background: white; }
  .btn-refine { color: #ef4444; border-color: #fecaca; }
  .btn-download { background: #0f172a; color: white; border: none; }
</style>
</head>
<body>

<div class="header-container">
  <div class="top-row">
    <button class="action-btn btn-download" onclick="exportData()">💾 Download CSV</button>
    <button class="action-btn btn-refine" onclick="refineData()">🔄 Refine (Clear Picks)</button>
    <button class="action-btn" style="color: #64748b" onclick="resetApp()">🧹 Factory Reset</button>
  </div>
</div>

<div class="name-bar" id="nameBar">
  <button class="name-btn register" onclick="openRegister()">+ Add Staff Member</button>
</div>

<div class="user-status-card" id="userStatusCard">
  <div style="display:flex; justify-content: space-between; align-items: center; gap: 20px;">
    <span>Acting as: <strong id="currentUserName" style="color:#007bff;"></strong></span>
    <button onclick="logout()" style="padding:2px 8px; cursor:pointer;">Switch User</button>
  </div>
</div>

<h2 id="headerTitle">Schedule Canvas</h2>
<div class="calendar-wrapper"><div class="calendar" id="calendar"></div></div>

<div class="tables-container">
  <div class="data-section">
    <h3>Staff List</h3>
    <table id="staffTable">
      <thead><tr><th>Name</th><th>Shifts Picked</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="data-section">
    <h3>Picks Export Preview</h3>
    <table id="dataTable">
      <thead><tr><th>Date</th><th>Slot</th><th>Name</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<div class="toast" id="toast"></div>

<div id="authModal" class="modal">
  <div class="modal-box">
    <h3 id="modalTitle">Add Staff Member</h3>
    <input id="nameInput" placeholder="Enter Full Name" onkeypress="if(event.key==='Enter') saveUser()">
    <button class="name-btn register" style="width:100%" onclick="saveUser()">Add to List</button>
    <button class="action-btn" style="width:100%; margin-top:10px;" onclick="closeModal()">Cancel</button>
  </div>
</div>

<script>
// CONFIG
const SLOTS = ["Charge", "Day", "Day", "Day", "Night", "Night"];
const START_DATE = "2024-05-13"; 
const DAYS_COUNT = 42;

let currentUser = null;
let staffList = JSON.parse(localStorage.getItem('org_staff')) || [];
let shiftsData = JSON.parse(localStorage.getItem('org_shifts')) || [];

function init() {
  renderNames();
  buildCalendar();
  shiftsData.forEach(s => applyUI(s.date, s.slotId, s.slotName, s.name, true));
  updateTables();
}

function buildCalendar() {
  const container = document.getElementById("calendar");
  container.innerHTML = "";
  const start = new Date(START_DATE.replace(/-/g, '/'));
  for (let i = 0; i < DAYS_COUNT; i++) {
    const dt = new Date(start.getFullYear(), start.getMonth(), start.getDate() + i);
    const ds = dt.toISOString().split('T')[0];
    const cell = document.createElement("div");
    cell.className = "day";
    cell.innerHTML = `<div class="date-title">${dt.toDateString().slice(0, 10)}</div>`;
    SLOTS.forEach((sn, idx) => {
      const el = document.createElement("div");
      el.className = "slot";
      el.textContent = sn;
      Object.assign(el.dataset, { date: ds, slotId: `${sn}-${idx}`, slotName: sn, owner: "" });
      el.onclick = () => handleToggle(el);
      cell.appendChild(el);
    });
    container.appendChild(cell);
  }
}

function handleToggle(el) {
  if (!currentUser) { toast("Select a user name first!"); return; }
  const { date, slotId, slotName, owner } = el.dataset;
  
  if (owner === currentUser) {
    applyUI(date, slotId, slotName, currentUser, false);
    shiftsData = shiftsData.filter(s => !(s.date === date && s.slotId === slotId));
  } else if (owner === "") {
    applyUI(date, slotId, slotName, currentUser, true);
    shiftsData.push({ date, slotId, slotName, name: currentUser });
  }
  
  localStorage.setItem('org_shifts', JSON.stringify(shiftsData));
  updateTables();
}

function applyUI(ds, id, sn, name, isAdd) {
  const el = document.querySelector(`.slot[data-date="${ds}"][data-slot-id="${id}"]`);
  if (!el) return;
  if (isAdd) {
    el.textContent = `${sn}: ${name}`;
    el.classList.add("filled");
    el.dataset.owner = name;
    if (name === currentUser) el.classList.add("mine");
  } else {
    el.textContent = sn;
    el.classList.remove("filled", "mine");
    el.dataset.owner = "";
  }
  refreshNameCounts();
}

function renderNames() {
  const b = document.getElementById("nameBar");
  const regBtn = b.querySelector('.register');
  b.innerHTML = ""; b.appendChild(regBtn);
  staffList.forEach(name => {
    const btn = document.createElement("button");
    btn.className = "name-btn" + (currentUser === name ? " active-user" : "");
    btn.textContent = name;
    btn.onclick = () => selectUser(name);
    b.appendChild(btn);
  });
}

function selectUser(name) {
  currentUser = name;
  document.getElementById("userStatusCard").style.display = "block";
  document.getElementById("currentUserName").textContent = name;
  renderNames();
  // Refresh calendar highlight
  document.querySelectorAll('.slot').forEach(el => {
    el.classList.remove("mine");
    if(el.dataset.owner === currentUser) el.classList.add("mine");
  });
}

function openRegister() { document.getElementById("authModal").style.display = "flex"; document.getElementById("nameInput").focus(); }
function closeModal() { document.getElementById("authModal").style.display = "none"; document.getElementById("nameInput").value = ""; }

function saveUser() {
  const name = document.getElementById("nameInput").value.trim();
  if (!name) return;
  if (staffList.includes(name)) return toast("User already exists");
  staffList.push(name);
  localStorage.setItem('org_staff', JSON.stringify(staffList));
  closeModal();
  renderNames();
  updateTables();
}

function updateTables() {
  // Update Data Table
  const tbody = document.querySelector("#dataTable tbody");
  tbody.innerHTML = "";
  shiftsData.sort((a,b) => a.date.localeCompare(b.date)).forEach(s => {
    const row = tbody.insertRow();
    row.innerHTML = `<td>${s.date}</td><td>${s.slotName}</td><td>${s.name}</td>`;
  });

  // Update Staff Table
  const sBody = document.querySelector("#staffTable tbody");
  sBody.innerHTML = "";
  staffList.forEach(name => {
    const count = shiftsData.filter(s => s.name === name).length;
    const row = sBody.insertRow();
    row.innerHTML = `<td>${name}</td><td>${count}</td>`;
  });
}

function refreshNameCounts() {
  const counts = {};
  shiftsData.forEach(s => counts[s.name] = (counts[s.name] || 0) + 1);
  document.querySelectorAll('.name-btn:not(.register)').forEach(btn => {
    const n = btn.textContent; const c = counts[n] || 0;
    if (c >= 20) btn.classList.add('completed'); else btn.classList.remove('completed');
  });
}

function exportData() {
  let csv = "Date,Slot,Name\n";
  shiftsData.sort((a,b) => a.date.localeCompare(b.date)).forEach(s => csv += `${s.date},${s.slotName},${s.name}\n`);
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = window.URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.setAttribute('href', url);
  a.setAttribute('download', `Schedule_Export_${new Date().toISOString().split('T')[0]}.csv`);
  a.click();
}

function refineData() {
  if(confirm("This will clear all shift picks but keep the staff names. Proceed?")) {
    shiftsData = [];
    localStorage.setItem('org_shifts', JSON.stringify(shiftsData));
    location.reload();
  }
}

function resetApp() {
  if(confirm("DELETE EVERYTHING? (Staff names and shifts will be gone)")) {
    localStorage.clear();
    location.reload();
  }
}

function logout() { currentUser = null; location.reload(); }
const toast = m => { const t = document.getElementById("toast"); t.textContent = m; t.classList.add("show"); setTimeout(() => t.classList.remove("show"), 3000); };

document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
