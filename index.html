<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit Schedule Canvas v1.8.3</title>
<style>
  :root {
    --gap-size: 10px;
    --period-divider: 24px;
    --brand-primary: #4f46e5;
    --brand-dark: #1e293b;
    --success: #10b981;
    --holiday-red: #be123c;
    --weekend-amber: #fffbeb;
    --month-alt: #f8fafc;
  }

  * { box-sizing: border-box; }
  body { font-family: 'Inter', system-ui, -apple-system, sans-serif; margin: 0; background: #f1f5f9; color: var(--brand-dark); line-height: 1.5; }
  
  .version-tag { position: fixed; top: 12px; right: 12px; font-size: 10px; color: #64748b; font-weight: 700; background: white; padding: 3px 8px; border-radius: 6px; border: 1px solid #e2e8f0; z-index: 2000; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }

  .sticky-wrapper {
    position: sticky;
    top: 0;
    z-index: 1000;
    background: #f1f5f9;
    padding: 15px 15px 5px 15px;
    border-bottom: 1px solid #e2e8f0;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
  }
  
  .header-container { display: flex; flex-direction: column; gap: 12px; margin-bottom: 10px; }
  .top-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  
  .dashboard { display: none; background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px 15px; margin-bottom: 10px; gap: 20px; flex-wrap: wrap; }
  .dashboard.active { display: flex; }
  
  .stat-group { display: flex; flex-direction: column; gap: 2px; border-right: 1px solid #f1f5f9; padding-right: 20px; }
  .stat-label { font-size: 9px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-value { font-size: 13px; font-weight: 700; }
  .stat-sub { font-size: 10px; color: #94a3b8; font-weight: 500; }

  .user-options { display: none; gap: 10px; }
  body.logged-in .user-options { display: flex; }
  .toggle-container { display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 700; background: white; padding: 8px 12px; border-radius: 8px; border: 1px solid #e2e8f0; cursor: pointer; user-select: none; }

  .name-bar { display:flex; flex-wrap:wrap; gap:10px; padding-bottom: 5px; }
  .name-btn { padding: 8px 16px; border: 1px solid #cbd5e1; border-radius: 10px; background: white; cursor: pointer; font-weight: 600; font-size: 12px; transition: 0.2s; }
  .name-btn.active-user { background: var(--brand-primary); color: white; border-color: var(--brand-primary); }
  body.logged-in .mgmt-btn, body.logged-in .name-btn:not(.active-user) { display: none !important; }

  .calendar-container { padding: 45px 15px 20px 15px; }
  .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 45px var(--gap-size); min-width: 1000px; }
  @media (min-width: 1400px) { .calendar { grid-template-columns: repeat(7, 1fr) var(--period-divider) repeat(7, 1fr); min-width: 100%; } }
  
  .day { border: 1px solid #cbd5e1; padding: 12px; border-radius: 12px; min-height: 380px; height: auto; display: flex; flex-direction: column; background: white; position: relative; }
  .week-label { position: absolute; top: -26px; left: 2px; font-size: 14px; font-weight: 900; color: var(--brand-dark); text-transform: uppercase; }

  .day.month-even { background: white; }
  .day.month-odd { background: var(--month-alt); }
  .day.is-weekend.month-even { background: var(--weekend-amber); }
  .day.is-weekend.month-odd { background: #fff8e6; }

  .date-block { min-height: 55px; margin-bottom: 10px; }
  .badge-row { display: flex; gap: 4px; height: 16px; margin-bottom: 4px; }
  .badge { font-size: 8px; padding: 1px 4px; border-radius: 3px; font-weight: 800; color: white; }
  .badge-hol { background: var(--holiday-red); }
  .badge-lw { background: var(--brand-primary); }
  .date-string { font-weight: 800; font-size: 14px; }
  .holiday-label { font-size: 10px; color: var(--holiday-red); font-weight: 700; margin-top: 2px; }

  .slots-container { flex-grow: 1; display: flex; flex-direction: column; gap: 4px; }
  .slot { border:1px solid #e2e8f0; padding: 6px 10px; background: white; border-radius: 8px; cursor: pointer; font-size: 11px; height: 32px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .slot.filled { background:#f1f5f9; color:#94a3b8; cursor: not-allowed; border-color: transparent; }
  .slot.filled.mine { background: var(--brand-primary); color:white; border-color: var(--brand-primary); }

  .table-section { padding: 40px 15px; background: white; border-top: 1px solid #e2e8f0; display: flex; flex-direction: column; gap: 30px; }
  .table-container { width: 100%; overflow-x: auto; border-radius: 12px; border: 1px solid #e2e8f0; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: left; }
  th { background: #f8fafc; padding: 12px; font-weight: 700; color: #64748b; border-bottom: 1px solid #e2e8f0; }
  td { padding: 12px; border-bottom: 1px solid #f1f5f9; }

  .action-btn { padding: 8px 16px; border-radius: 8px; border: 1px solid #e2e8f0; cursor: pointer; font-weight: 700; background: white; font-size: 12px; }
  .toast { position: fixed; top: 100px; left: 50%; transform: translateX(-50%); background: var(--brand-dark); color: white; padding: 10px 24px; border-radius: 10px; opacity: 0; transition: 0.3s; z-index: 10000; font-weight: 700; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="version-tag">v1.8.3</div>

<div class="sticky-wrapper">
    <div class="header-container">
        <div class="top-row">
            <div class="user-options">
                <label class="toggle-container"><input type="checkbox" id="hideOthersToggle" onchange="document.body.classList.toggle('hide-others')"> 🔒 Hide Others</label>
                <label class="toggle-container"><input type="checkbox" id="condensedToggle" onchange="buildCalendar()"> ✨ Simplify View</label>
            </div>
            <button class="action-btn mgmt-btn" onclick="setStartDate()">📅 Start Date</button>
            <button class="action-btn" style="background:var(--brand-dark); color:white; border:none;" onclick="exportData()">Download CSV</button>
        </div>
    </div>

    <div id="globalDashboard" class="dashboard active">
        <div class="stat-group">
            <div class="stat-label">Unit Core Progress</div>
            <div class="stat-value" id="global-core-val">0/210</div>
            <div class="stat-sub">Total Core Assigned</div>
        </div>
        <div class="stat-group" style="border:none">
            <div class="stat-label">Total Vacant Core</div>
            <div class="stat-value" id="global-vacant-val">D: 0 | N: 0 | C: 0</div>
            <div class="stat-sub">Across 6 Weeks</div>
        </div>
    </div>

    <div id="userDashboard" class="dashboard">
        <div class="stat-group">
            <div class="stat-label">Your Picks</div>
            <div class="stat-value" id="stat-total">0/20</div>
            <div class="stat-sub" id="stat-blocks">B1:0 | B2:0 | B3:0</div>
        </div>
        <div class="stat-group" style="border:none">
            <div class="stat-label">Shift Split</div>
            <div class="stat-value" id="stat-split">D:0 | N:0 | C:0</div>
            <div class="stat-sub" id="stat-lock-msg">Overflow Locked</div>
        </div>
    </div>

    <div class="name-bar" id="nameBar">
        <button class="name-btn mgmt-btn" style="background:var(--brand-dark); color:white;" onclick="addStaffPrompt()">+ ADD STAFF</button>
    </div>
</div>

<div class="calendar-container">
    <div class="calendar" id="calendar"></div>
</div>

<div class="table-section">
    <h3 style="margin: 0; font-size: 16px;">Unit Master List</h3>
    <div class="table-container"><table id="masterTable"><thead><tr><th>Date</th><th>Type</th><th>Staff Name</th></tr></thead><tbody></tbody></table></div>
</div>

<div class="toast" id="toast"></div>

<script>
let START_DATE = localStorage.getItem('canvas_start_date') || "2026-05-11"; 
const CORE_IDS = ['Charge-0', 'Day-0', 'Day-1', 'Night-0', 'Night-1'];

let currentUser = null;
let staffList = JSON.parse(localStorage.getItem('org_staff')) || [];
let shiftsData = JSON.parse(localStorage.getItem('org_shifts')) || [];
let ACTIVE_HOLIDAYS = {};

function generateHolidays(year) {
    const h = {};
    const getNthDay = (nth, day, month, yr) => {
        let d = new Date(yr, month, 1);
        let count = 0;
        while (count < nth) {
            if (d.getDay() === day) count++;
            if (count < nth) d.setDate(d.getDate() + 1);
        }
        return d;
    };

    const add = (dt, name) => h[dt.toISOString().split('T')[0]] = name;

    add(new Date(year, 0, 1), "New Year's Day");
    add(getNthDay(3, 1, 1, year), "Family Day");
    // Simplified Good Friday (approx)
    add(new Date(year, 3, 3), "Good Friday"); 
    
    // Victoria Day (Monday preceding May 25)
    let vic = new Date(year, 4, 24);
    while(vic.getDay() !== 1) vic.setDate(vic.getDate() - 1);
    add(vic, "Victoria Day");

    add(new Date(year, 6, 1), "Canada Day");
    add(getNthDay(1, 1, 7, year), "Civic Holiday");
    add(getNthDay(1, 1, 8, year), "Labour Day");
    add(getNthDay(2, 1, 9, year), "Thanksgiving");
    add(new Date(year, 10, 11), "Remembrance Day");
    add(new Date(year, 11, 25), "Christmas Day");
    add(new Date(year, 11, 26), "Boxing Day");

    return h;
}

function init() {
    const startYear = new Date(START_DATE.replace(/-/g, '/')).getFullYear();
    ACTIVE_HOLIDAYS = {...generateHolidays(startYear), ...generateHolidays(startYear + 1)};
    saveAndRefresh();
}

function isGlobalCoreFull() { return shiftsData.filter(s => CORE_IDS.includes(s.slotId)).length >= 210; }

function getOffsetDate(b, o) {
    const d = new Date(b);
    d.setDate(d.getDate() + o);
    return d.toISOString().split('T')[0];
}

function buildCalendar() {
  const container = document.getElementById("calendar");
  container.innerHTML = "";
  const start = new Date(START_DATE.replace(/-/g, '/'));
  const isLarge = window.innerWidth >= 1400;
  const isCondensed = document.getElementById('condensedToggle')?.checked;
  const globalUnlocked = isGlobalCoreFull();

  for (let i = 0; i < 42; i++) {
    if (isLarge && i > 0 && i % 7 === 0 && (i / 7) % 2 !== 0) {
        const spacer = document.createElement("div"); spacer.style.width = "24px"; container.appendChild(spacer);
    }
    const dt = new Date(start.getFullYear(), start.getMonth(), start.getDate() + i);
    const ds = dt.toISOString().split('T')[0];
    const holName = ACTIVE_HOLIDAYS[ds];
    const dayOfWeek = dt.getDay();
    const monthClass = (dt.getMonth() % 2 === 0) ? 'month-even' : 'month-odd';

    let isLW = false;
    if (dayOfWeek === 6 && (ACTIVE_HOLIDAYS[getOffsetDate(dt, -1)] || ACTIVE_HOLIDAYS[getOffsetDate(dt, 2)])) isLW = true;
    if (dayOfWeek === 0 && (ACTIVE_HOLIDAYS[getOffsetDate(dt, -2)] || ACTIVE_HOLIDAYS[getOffsetDate(dt, 1)])) isLW = true;

    const cell = document.createElement("div");
    cell.className = `day ${monthClass} ${dayOfWeek === 0 || dayOfWeek === 6 ? 'is-weekend' : ''} ${holName ? 'is-holiday' : ''}`;
    let labels = (dayOfWeek === 1) ? `<div class="week-label">Week ${Math.floor(i/7)+1}</div>` : "";

    cell.innerHTML = `
      ${labels}
      <div class="date-block">
        <div class="badge-row">
            ${holName ? '<span class="badge badge-hol">HOL</span>' : ''}
            ${isLW ? '<span class="badge badge-lw">LW</span>' : ''}
        </div>
        <div class="date-string">${dt.toDateString().slice(0, 10)}</div>
        ${holName ? `<div class="holiday-label">${holName}</div>` : ''}
      </div>`;
    
    const slotsDiv = document.createElement("div");
    slotsDiv.className = "slots-container";
    const dayShifts = shiftsData.filter(s => s.date === ds);

    ['Charge', 'Day', 'Night'].forEach(type => {
        const typePicks = dayShifts.filter(s => s.slotName === type);
        const myPick = typePicks.find(s => s.name === currentUser);
        if (currentUser && isCondensed) {
            const el = document.createElement("div");
            if (myPick) { el.className = "slot filled mine"; el.textContent = `${type}: ${currentUser}`; el.onclick = () => handleAction({dataset: {date: ds, slotName: type, owner: currentUser}}); } 
            else {
                const sid = [0,1,2,3].map(n => `${type}-${n}`).find(id => !typePicks.some(s => s.slotId === id) && (CORE_IDS.includes(id) || globalUnlocked));
                if (!sid || (typePicks.length >= (type === 'Charge' ? 1 : 4))) { el.className = "slot filled"; el.textContent = `${type}: Full`; } 
                else { el.className = "slot"; el.textContent = type; Object.assign(el.dataset, { date: ds, slotId: sid, slotName: type, owner: "" }); el.onclick = () => handleAction(el); }
            }
            slotsDiv.appendChild(el);
        } else {
            const max = (type === 'Charge' ? 1 : 4);
            for(let j=0; j<max; j++) {
                const sid = `${type}-${j}`;
                const pick = typePicks.find(s => s.slotId === sid);
                const isNext = currentUser && !typePicks.some((s, idx) => idx >= j);
                if (pick || CORE_IDS.includes(sid) || (isNext && globalUnlocked)) {
                    const el = document.createElement("div");
                    el.className = "slot" + (pick ? " filled" : "");
                    if (pick?.name === currentUser) el.classList.add("mine");
                    el.textContent = pick ? `${type}: ${pick.name}` : type;
                    Object.assign(el.dataset, { date: ds, slotId: sid, slotName: type, owner: pick ? pick.name : "" });
                    el.onclick = () => handleAction(el);
                    slotsDiv.appendChild(el);
                }
            }
        }
    });
    cell.appendChild(slotsDiv); container.appendChild(cell);
  }
}

function handleAction(el) {
  if (!currentUser) return toast("⚠️ Log in first.");
  const { date, slotName, owner, slotId } = el.dataset;
  if (owner && owner !== currentUser) return;
  if (!owner && !CORE_IDS.includes(slotId) && !isGlobalCoreFull()) return toast("❌ Core must be full first.");
  const dt = new Date(date.replace(/-/g, '/'));
  const day = dt.getDay();
  let set = (ACTIVE_HOLIDAYS[date]) ? [getOffsetDate(dt, (day === 1 ? -2 : 1)), getOffsetDate(dt, (day === 1 ? -1 : 2)), date] :
            (day === 6 || day === 0) ? [(day === 6) ? date : getOffsetDate(dt, -1), (day === 6) ? getOffsetDate(dt, 1) : date] : [date];
  if (owner === currentUser) { set.forEach(d => removeShiftByDate(d)); saveAndRefresh(); return; }
  if (validateShadowState(set, slotName)) { set.forEach(d => { removeShiftByDate(d); pickShiftWithGravity(d, slotName); }); saveAndRefresh(); }
}

function validateShadowState(dates, type) {
    let shadow = shiftsData.filter(s => s.name === currentUser).map(s => ({...s}));
    shadow = shadow.filter(s => !dates.includes(s.date));
    dates.forEach(d => shadow.push({ date: d, slotName: type }));
    if (shadow.length > 20) { toast("❌ Max 20 shifts."); return false; }
    for (let p of shadow) {
        const dt = new Date(p.date.replace(/-/g, '/'));
        if (p.slotName !== "Night" && shadow.some(s => s.date === getOffsetDate(dt, -1) && s.slotName === "Night")) { toast("❌ Turnaround Error."); return false; }
        const has = (d) => shadow.some(s => s.date === d);
        if ([[-1,-2,-3,-4], [-1,-2,-3,+1], [-1,-2,+1,+2], [-1,+1,+2,+3], [+1,+2,+3,+4]].some(s => s.every(o => has(getOffsetDate(dt, o))))) { toast("❌ Max 4 consecutive."); return false; }
        const isN = (p.slotName === "Night");
        const hasT = (d) => shadow.some(s => s.date === d && (isN ? s.slotName === "Night" : s.slotName !== "Night"));
        if ([[-1,-2,-3], [-1,-2,+1], [-1,+1,+2], [+1,+2,+3]].some(s => s.every(o => hasT(getOffsetDate(dt, o))))) { toast(`❌ Max 3 same-type.`); return false; }
        const blockStart = new Date(START_DATE.replace(/-/g, '/'));
        const bi = Math.floor((Math.floor((dt - blockStart) / 86400000) / 7) / 2);
        if (shadow.filter(s => s.date >= getOffsetDate(blockStart, bi*14) && s.date <= getOffsetDate(blockStart, (bi*14)+13)).length > 7) { toast(`❌ Block limit (7).`); return false; }
    }
    return true;
}

function updateDashboard() {
    const gDash = document.getElementById('globalDashboard');
    const uDash = document.getElementById('userDashboard');
    const coreFilled = shiftsData.filter(s => CORE_IDS.includes(s.slotId)).length;
    if (!currentUser) {
        uDash.classList.remove('active'); gDash.classList.add('active'); document.body.classList.remove('logged-in');
        let cVac = 0, dVac = 0, nVac = 0;
        const start = new Date(START_DATE.replace(/-/g, '/'));
        for(let i=0; i<42; i++) {
            const ds = getOffsetDate(start, i);
            const dsData = shiftsData.filter(s => s.date === ds);
            if (!dsData.some(s => s.slotId === 'Charge-0')) cVac++;
            if (!dsData.some(s => s.slotId === 'Day-0')) dVac++;
            if (!dsData.some(s => s.slotId === 'Day-1')) dVac++;
            if (!dsData.some(s => s.slotId === 'Night-0')) nVac++;
            if (!dsData.some(s => s.slotId === 'Night-1')) nVac++;
        }
        document.getElementById('global-core-val').textContent = `${coreFilled}/210`;
        document.getElementById('global-vacant-val').textContent = `D: ${dVac} | N: ${nVac} | C: ${cVac}`;
        return;
    }
    gDash.classList.remove('active'); uDash.classList.add('active'); document.body.classList.add('logged-in');
    const my = shiftsData.filter(s => s.name === currentUser);
    const st = new Date(START_DATE.replace(/-/g, '/'));
    const getB = (s, e) => my.filter(p => p.date >= getOffsetDate(st, s) && p.date <= getOffsetDate(st, e)).length;
    document.getElementById('stat-total').textContent = `${my.length}/20`;
    document.getElementById('stat-blocks').textContent = `B1:${getB(0,13)} | B2:${getB(14,27)} | B3:${getB(28,41)}`;
    document.getElementById('stat-lock-msg').textContent = coreFilled >= 210 ? "✅ Overflow Unlocked" : "❌ Overflow Locked";
    document.getElementById('stat-split').textContent = `${my.filter(p=>p.slotName==="Day").length} / ${my.filter(p=>p.slotName==="Night").length} / ${my.filter(p=>p.slotName==="Charge").length}`;
}

function saveAndRefresh() { localStorage.setItem('org_shifts', JSON.stringify(shiftsData)); buildCalendar(); renderNames(); updateDashboard(); renderTables(); }
function pickShiftWithGravity(ds, type) { const sid = [0,1,2,3].map(n => `${type}-${n}`).find(id => !shiftsData.filter(s => s.date === ds).some(s => s.slotId === id)); if (sid) shiftsData.push({ date: ds, slotId: sid, slotName: type, name: currentUser }); }
function removeShiftByDate(ds) { shiftsData = shiftsData.filter(s => !(s.name === currentUser && s.date === ds)); }

function renderNames() {
  const b = document.getElementById("nameBar"); b.innerHTML = '<button class="name-btn mgmt-btn" style="background:var(--brand-dark); color:white;" onclick="addStaffPrompt()">+ ADD STAFF</button>';
  staffList.sort().forEach(n => {
    const c = shiftsData.filter(s => s.name === n).length;
    const btn = document.createElement("button"); btn.className = "name-btn" + (currentUser === n ? " active-user" : "");
    btn.innerHTML = `${n} <span>(${c}/20)</span>`;
    btn.onclick = () => { if (currentUser === n) logout(); else currentUser = n; saveAndRefresh(); };
    b.appendChild(btn);
  });
}

function logout() { currentUser = null; document.getElementById('hideOthersToggle').checked = false; document.getElementById('condensedToggle').checked = false; document.body.classList.remove('hide-others'); saveAndRefresh(); }
function renderTables() {
    const masterBody = document.querySelector("#masterTable tbody");
    masterBody.innerHTML = "";
    [...shiftsData].sort((a,b) => a.date.localeCompare(b.date)).forEach(s => masterBody.innerHTML += `<tr><td>${s.date}</td><td>${s.slotName}</td><td>${s.name}</td></tr>`);
}

function addStaffPrompt() { const n = prompt("Name:"); if (n && !staffList.includes(n)) { staffList.push(n); localStorage.setItem('org_staff', JSON.stringify(staffList)); currentUser = n; saveAndRefresh(); } }
function setStartDate() { const d = prompt("YYYY-MM-DD:", START_DATE); if (d && !isNaN(Date.parse(d))) { START_DATE = d; localStorage.setItem('canvas_start_date', d); location.reload(); } }
function exportData() { let csv = "Date,Slot,Name\n"; [...shiftsData].sort((a,b) => a.date.localeCompare(b.date)).forEach(s => csv += `${s.date},${s.slotName},${s.name}\n`); const a = document.createElement('a'); a.setAttribute('href', window.URL.createObjectURL(new Blob([csv], { type: 'text/csv' }))); a.setAttribute('download', `Schedule.csv`); a.click(); }
const toast = (m) => { const t = document.getElementById("toast"); t.textContent = m; t.classList.add("show"); setTimeout(() => t.classList.remove("show"), 3000); };
window.onresize = () => buildCalendar();
document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
