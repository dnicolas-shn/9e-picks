<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit Schedule Picks</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 10px; background: #f0f2f5; }
  .header-container { display: flex; flex-direction: column; gap: 10px; border-bottom: 1px solid #ddd; padding-bottom: 15px; margin-bottom: 15px; }
  .name-bar { display:flex; flex-wrap:wrap; gap:8px; justify-content:flex-start; margin-bottom:15px; }
  .name-btn { padding:8px 14px; border:1px solid #ccc; border-radius:20px; background:white; color: #334155; cursor:pointer; transition: 0.2s; font-weight: 500; }
  .name-btn.completed { background: #fef08a; color: #713f12; border-color: #eab308; font-weight: 700; }
  .name-btn.register { background:#28a745; color:white; border-color:#28a745; font-weight: 700; }
  .user-status-card { display:none; background:white; padding:15px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.1); margin-bottom:20px; border-left: 5px solid #007bff; max-width: fit-content; }
  .stats-bar { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
  .stat-badge { background: #f1f5f9; color: #475569; padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 700; border: 1px solid #e2e8f0; }
  .calendar-wrapper { overflow-x: auto; padding-bottom: 10px; width: 100%; }
  .calendar { display: grid; grid-template-columns: repeat(7, minmax(140px, 1fr)); gap: 48px 10px; min-width: 1000px; padding-top: 15px; }
  @media (min-width: 1200px) { .calendar { grid-template-columns: repeat(14, minmax(125px, 1fr)); min-width: 1800px; } }
  .day { border: 1px solid #ddd; padding: 8px; border-radius: 8px; min-height: 200px; display: flex; flex-direction: column; position: relative; background: white; }
  .date-title { font-weight:bold; font-size:14px; color: #333; margin-bottom: 4px; border-bottom:1px solid #eee; padding-bottom:4px; }
  .slot { border:1px solid #eee; padding:6px; background:#f8f9fa; margin-bottom:5px; border-radius:4px; cursor:pointer; font-size:12px; transition: 0.2s; }
  .slot.filled { background:#cbd5e1; color:#334155; border-color:#94a3b8; cursor:not-allowed; }
  .slot.filled.mine { background:#007bff; color:white; border-color:#0056b3; }
  .slot.hover-focus { transform: scale(1.05); z-index: 5; font-weight: 700; }
  .slot.hover-focus-day { background: #fef08a !important; color: #854d0e !important; }
  .slot.hover-focus-night { background: #d8b4fe !important; color: #581c87 !important; }
  .slot.hover-focus-charge { background: #facc15 !important; color: #713f12 !important; }
  .modal { position:fixed; inset:0; background:rgba(0,0,0,.6); display:none; align-items: flex-start; justify-content:center; z-index:999; padding-top: 50px; }
  .modal-box { background:white; padding:25px; border-radius:12px; width:90%; max-width:350px; }
  .pin-boxes { display:flex; justify-content:center; gap:10px; margin-top:20px; }
  .pin-boxes input { width:50px; height:60px; font-size:28px; text-align:center; border:2px solid #ddd; border-radius:10px; }
  #nameInput { width:100%; padding:12px; margin-top:15px; border:2px solid #ddd; border-radius:8px; box-sizing:border-box; font-size: 20px; font-weight: 700; text-align: center; color: #007bff; }
  .toast { position: fixed !important; top: 20px !important; left: 50% !important; transform: translateX(-50%) !important; background: rgba(15, 23, 42, 0.95); color: white; padding: 12px 24px; border-radius: 50px; opacity: 0; transition: 0.3s; z-index: 10000; pointer-events: none; font-weight: 600; }
  .toast.show { opacity: 1; top: 30px !important; }
</style>
</head>
<body>

<div class="header-container">
  <div class="top-row">
    <button class="name-btn" style="font-size: 11px;" onclick="location.reload()">🔄 Force Sync Sheet</button>
  </div>
</div>

<div class="name-bar" id="nameBar">
  <button class="name-btn register" onclick="openRegister()">+ New User</button>
</div>

<div class="user-status-card" id="userStatusCard">
  <div class="user-header-row">
    <div class="user-info">Logged In: <span id="currentUserName" style="color:#007bff;"></span></div>
    <button class="logout-btn" onclick="logout()" style="cursor:pointer; background:#fee2e2; border:1px solid #fecaca; padding:4px 8px; border-radius:4px; font-size:11px; color:#991b1b;">Logout</button>
  </div>
  <div class="stats-bar" id="statsBar"></div>
</div>

<h2 id="headerTitle" class="section-header">Detecting Sheet Headers...</h2>
<div class="calendar-wrapper"><div class="calendar" id="calendar"></div></div>

<div class="toast" id="toast"></div>

<div id="authModal" class="modal" onclick="cancelAuth()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div id="authTitle" style="text-align:center; font-weight:800; color:#1e293b; font-size: 1.2rem;">Verification</div>
    <input id="nameInput" placeholder="Enter Name Exactly" style="display:none;">
    <div class="pin-boxes">
      <input maxlength="1" inputmode="numeric">
      <input maxlength="1" inputmode="numeric">
      <input maxlength="1" inputmode="numeric">
      <input maxlength="1" inputmode="numeric">
    </div>
  </div>
</div>

<script>
// --- CONFIG ---
const STEIN_URL = 'https://api.steinhq.com/v1/storages/69db1f5ebb16885eb7bd2289'; 
const SLOTS = ["Charge", "Day", "Day", "Day", "Night", "Night"];

let currentUser = null;
let staffList = [];
let allShiftsData = [];
let optStartDate = "";
let optDays = 42;
let authMode = "login";
let activeLoginName = "";
let userActiveStatus = {};

const toast = m => {
  const t = document.getElementById("toast");
  t.textContent = m; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
};

// --- HEADER ENFORCER LOGIC ---
// This ensures that even if headers are renamed, the app finds the right data.
function normalizeData(array, mapping) {
  if (!array || array.length === 0) return [];
  return array.map(row => {
    let newRow = {};
    for (let internalKey in mapping) {
      const possibleNames = mapping[internalKey];
      // Find which key in the row matches our list of possible header names
      const foundKey = Object.keys(row).find(k => 
        possibleNames.includes(k.toLowerCase().trim())
      );
      newRow[internalKey] = foundKey ? row[foundKey] : null;
    }
    return newRow;
  });
}

// --- DATA INIT ---
async function init() {
  try {
    const [optRes, staffRes, shiftRes] = await Promise.all([
      fetch(`${STEIN_URL}/Options`),
      fetch(`${STEIN_URL}/Names`),
      fetch(`${STEIN_URL}/Shifts`)
    ]);

    const optsRaw = await optRes.json();
    const staffRaw = await staffRes.json();
    const shiftRaw = await shiftRes.json();

    // Enforce Options Headers
    const cleanOpts = normalizeData(optsRaw, {
      start: ['startdate', 'start', 'value', 'date'],
      days: ['days', 'period', 'period (days)', 'length']
    });
    optStartDate = cleanOpts[0].start;
    optDays = parseInt(cleanOpts[0].days || 42);

    // Enforce Staff Headers
    staffList = normalizeData(staffRaw, {
      name: ['name', 'staff', 'full name', 'nurse'],
      code: ['code', 'pin', 'pass', 'password', 'secret'],
      active: ['active', 'status', 'approved', 'enabled']
    });

    // Enforce Shift Headers
    allShiftsData = normalizeData(shiftRaw, {
      date: ['date', 'day'],
      slotId: ['slotid', 'id', 'positionid'],
      slotName: ['slotname', 'slot', 'type'],
      name: ['name', 'staff', 'owner']
    });

    document.getElementById("headerTitle").textContent = `Unit Schedule: ${optStartDate}`;
    renderNames();
    buildCalendar();
    
    allShiftsData.forEach(s => {
      if(s.date && s.slotId) applyUI(s.date, s.slotId, s.slotName, s.name, true, true);
    });
  } catch (e) {
    toast("Check Google Sheet Tabs/Headers.");
    console.error(e);
  }
}

function buildCalendar() {
  const container = document.getElementById("calendar");
  container.innerHTML = "";
  const start = new Date(optStartDate.replace(/-/g,'/'));
  
  for (let i = 0; i < optDays; i++) {
    const dt = new Date(start.getFullYear(), start.getMonth(), start.getDate() + i);
    const ds = dt.toISOString().split('T')[0];
    const cell = document.createElement("div");
    cell.className = "day";
    cell.innerHTML = `<div class="date-title">${dt.toDateString().slice(0,10)}</div>`;
    
    SLOTS.forEach((sn, idx) => {
      const el = document.createElement("div");
      el.className = "slot";
      el.textContent = sn;
      Object.assign(el.dataset, {date: ds, slotId: `${sn}-${idx}`, slotName: sn, owner: ""});
      el.ondblclick = () => handleToggle(el);
      cell.appendChild(el);
    });
    container.appendChild(cell);
  }
}

async function handleToggle(el) {
  if (!currentUser) return toast("Login Required");
  if (userActiveStatus[currentUser] === false) return toast("Pending Admin Approval.");
  
  const ds = el.dataset.date, id = el.dataset.slotId, sn = el.dataset.slotName;
  
  if (el.dataset.owner === currentUser) {
    applyUI(ds, id, sn, currentUser, false);
    allShiftsData = allShiftsData.filter(s => !(s.date === ds && s.slotId === id));
    await fetch(`${STEIN_URL}/Shifts`, {
      method: 'DELETE',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ condition: { date: ds, slotId: id, name: currentUser } })
    });
  } else if (el.dataset.owner === "") {
    if (allShiftsData.filter(s => s.name === currentUser).length >= 20) return toast("Max 20 shifts allowed.");
    
    applyUI(ds, id, sn, currentUser, true);
    const newShift = { date: ds, slotId: id, slotName: sn, name: currentUser };
    allShiftsData.push(newShift);
    await fetch(`${STEIN_URL}/Shifts`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify([newShift])
    });
  }
}

function applyUI(ds, id, sn, name, isAdding, pass) {
  const el = document.querySelector(`.slot[data-date="${ds}"][data-slot-id="${id}"]`);
  if (!el) return;
  if (isAdding) {
    el.textContent = `${sn}: ${name}`;
    el.classList.add("filled");
    el.dataset.owner = name;
    if (name === currentUser) el.classList.add("mine");
  } else {
    el.textContent = sn;
    el.classList.remove("filled", "mine");
    el.dataset.owner = "";
  }
  refreshNameCounts();
}

// --- AUTH & REGISTER ---
function renderNames() {
  const b = document.getElementById("nameBar");
  const regBtn = b.querySelector('.register');
  b.innerHTML = "";
  b.appendChild(regBtn);
  
  staffList.forEach(u => {
    userActiveStatus[u.name] = (String(u.active).toUpperCase() === "TRUE" || u.active === true);
    const btn = document.createElement("button");
    btn.className="name-btn";
    btn.dataset.name = u.name;
    btn.textContent = u.name;
    btn.onclick=()=>openLogin(u.name);
    btn.onmouseenter = () => handleHover(u.name, true);
    btn.onmouseleave = () => handleHover(u.name, false);
    b.appendChild(btn);
  });
}

function openLogin(name) {
  authMode = "login";
  activeLoginName = name;
  document.getElementById("authTitle").textContent = name;
  document.getElementById("nameInput").style.display = "none";
  document.getElementById("authModal").style.display = "flex";
  clearPin();
}

function openRegister() {
  authMode = "register";
  document.getElementById("authTitle").textContent = "Register Staff";
  document.getElementById("nameInput").style.display = "block";
  document.getElementById("nameInput").value = "";
  document.getElementById("authModal").style.display = "flex";
  clearPin();
}

async function checkPin() {
  const pin = Array.from(document.querySelectorAll(".pin-boxes input")).map(i => i.value).join("");
  if (pin.length < 4) return;

  if (authMode === "register") {
    const name = document.getElementById("nameInput").value.trim();
    if (!name) return toast("Enter Full Name");
    // Registration always sends lowercase keys for sheet safety
    const newUser = { name: name, code: pin, active: "FALSE" };
    await fetch(`${STEIN_URL}/Names`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify([newUser])
    });
    toast("Registered. Ask Admin to check Active box.");
    setTimeout(() => location.reload(), 2000);
  } else {
    const user = staffList.find(u => u.name === activeLoginName && String(u.code) === pin);
    if (user) {
      currentUser = activeLoginName;
      document.getElementById("authModal").style.display = "none";
      document.getElementById("nameBar").style.display = "none";
      document.getElementById("userStatusCard").style.display = "block";
      document.getElementById("currentUserName").textContent = currentUser;
      document.querySelectorAll('.slot.filled').forEach(el => {
        if(el.dataset.owner === currentUser) el.classList.add("mine");
      });
      toast(`Signed in: ${currentUser}`);
    } else {
      toast("Invalid PIN");
      clearPin();
    }
  }
}

const pinInputs = document.querySelectorAll(".pin-boxes input");
pinInputs.forEach((inp, idx) => {
  inp.addEventListener("input", () => { if (inp.value && idx < 3) pinInputs[idx + 1].focus(); if (idx === 3) checkPin(); });
  inp.addEventListener("keydown", (e) => { if (e.key === "Backspace" && !inp.value && idx > 0) pinInputs[idx - 1].focus(); });
});

function clearPin() { pinInputs.forEach(i => i.value = ""); pinInputs[0].focus(); }
function logout() { location.reload(); }
function cancelAuth() { document.getElementById("authModal").style.display = "none"; }
function handleHover(name, isH) {
  document.querySelectorAll(`.slot.filled[data-owner="${name}"]`).forEach(el => {
    if (isH) {
      el.classList.add('hover-focus');
      const t = el.dataset.slotName;
      if (t === "Charge") el.classList.add('hover-focus-charge');
      else if (t === "Night") el.classList.add('hover-focus-night');
      else el.classList.add('hover-focus-day');
    } else { el.classList.remove('hover-focus', 'hover-focus-day', 'hover-focus-night', 'hover-focus-charge'); }
  });
}

function refreshNameCounts() {
  const counts = {};
  document.querySelectorAll('.slot.filled').forEach(el => { 
    const owner = el.dataset.owner;
    counts[owner] = (counts[owner] || 0) + 1; 
  });
  document.querySelectorAll('.name-btn:not(.register)').forEach(btn => {
    const n = btn.dataset.name;
    const c = counts[n] || 0;
    btn.textContent = `${n} (${c}/20)`;
    if (c >= 20) btn.classList.add('completed');
  });
}

document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
