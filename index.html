<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit Schedule Canvas v1.8.5</title>
<style>
  :root {
    --gap-size: 10px;
    --period-divider: 24px;
    --brand-primary: #4f46e5;
    --brand-dark: #1e293b;
    --success: #10b981;
    --holiday-red: #be123c;
    --weekend-amber: #fffbeb;
    --month-alt: #f8fafc;
  }

  * { box-sizing: border-box; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    margin: 0;
    background: #f1f5f9;
    color: var(--brand-dark);
    line-height: 1.5;
  }

  .version-tag {
    position: fixed;
    top: 12px;
    right: 12px;
    font-size: 10px;
    color: #64748b;
    font-weight: 700;
    background: white;
    padding: 3px 8px;
    border-radius: 6px;
    border: 1px solid #e2e8f0;
    z-index: 2000;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }

  .sticky-wrapper {
    position: sticky;
    top: 0;
    z-index: 1000;
    background: #f1f5f9;
    padding: 15px 15px 5px 15px;
    border-bottom: 1px solid #e2e8f0;
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
  }

  .header-container { display: flex; flex-direction: column; gap: 12px; margin-bottom: 10px; }
  .top-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

  .dashboard {
    display: none;
    background: white;
    border: 1px solid #e2e8f0;
    border-radius: 12px;
    padding: 12px 15px;
    margin-bottom: 10px;
    gap: 20px;
    flex-wrap: wrap;
  }
  .dashboard.active { display: flex; }

  .stat-group {
    display: flex;
    flex-direction: column;
    gap: 2px;
    border-right: 1px solid #f1f5f9;
    padding-right: 20px;
  }
  .stat-label {
    font-size: 9px;
    font-weight: 800;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .stat-value { font-size: 13px; font-weight: 700; }
  .stat-sub { font-size: 10px; color: #94a3b8; font-weight: 500; }

  .user-options { display: none; gap: 10px; }
  body.logged-in .user-options { display: flex; }
  .toggle-container {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    font-weight: 700;
    background: white;
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid #e2e8f0;
    cursor: pointer;
    user-select: none;
  }

  .name-bar { display:flex; flex-wrap:wrap; gap:10px; padding-bottom: 5px; }
  .name-btn {
    padding: 8px 16px;
    border: 1px solid #cbd5e1;
    border-radius: 10px;
    background: white;
    cursor: pointer;
    font-weight: 600;
    font-size: 12px;
    transition: 0.2s;
  }
  .name-btn.active-user {
    background: var(--brand-primary);
    color: white;
    border-color: var(--brand-primary);
  }
  body.logged-in .mgmt-btn,
  body.logged-in .name-btn:not(.active-user) { display: none !important; }

  .calendar-container { padding: 45px 15px 20px 15px; }
  .calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 45px var(--gap-size);
    min-width: 1000px;
  }
  @media (min-width: 1400px) {
    .calendar {
      grid-template-columns: repeat(7, 1fr) var(--period-divider) repeat(7, 1fr);
      min-width: 100%;
    }
  }

  .day {
    border: 1px solid #cbd5e1;
    padding: 12px;
    border-radius: 12px;
    min-height: 380px;
    display: flex;
    flex-direction: column;
    background: white;
    position: relative;
  }
  .week-label {
    position: absolute;
    top: -26px;
    left: 2px;
    font-size: 14px;
    font-weight: 900;
    color: var(--brand-dark);
    text-transform: uppercase;
  }

  .day.month-even { background: white; }
  .day.month-odd { background: var(--month-alt); }
  .day.is-weekend.month-even { background: var(--weekend-amber); }
  .day.is-weekend.month-odd { background: #fff8e6; }

  .date-block { min-height: 55px; margin-bottom: 10px; }
  .badge-row { display: flex; gap: 4px; height: 16px; margin-bottom: 4px; }
  .badge {
    font-size: 8px;
    padding: 1px 4px;
    border-radius: 3px;
    font-weight: 800;
    color: white;
  }
  .badge-hol { background: var(--holiday-red); }
  .badge-lw { background: var(--brand-primary); }

  .date-string { font-weight: 800; font-size: 14px; }
  .holiday-label { font-size: 10px; color: var(--holiday-red); font-weight: 700; margin-top: 2px; }

  .slots-container { flex-grow: 1; display: flex; flex-direction: column; gap: 4px; }
  .slot {
    border:1px solid #e2e8f0;
    padding: 6px 10px;
    background: white;
    border-radius: 8px;
    cursor: pointer;
    font-size: 11px;
    height: 32px;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }
  .slot.filled {
    background:#f1f5f9;
    color:#94a3b8;
    cursor: not-allowed;
    border-color: transparent;
  }
  .slot.filled.mine {
    background: var(--brand-primary);
    color:white;
    border-color: var(--brand-primary);
  }

  .table-section {
    padding: 40px 15px;
    background: white;
    border-top: 1px solid #e2e8f0;
    display: flex;
    flex-direction: column;
    gap: 30px;
  }
  .table-container {
    width: 100%;
    overflow-x: auto;
    border-radius: 12px;
    border: 1px solid #e2e8f0;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    text-align: left;
  }
  th {
    background: #f8fafc;
    padding: 12px;
    font-weight: 700;
    color: #64748b;
    border-bottom: 1px solid #e2e8f0;
  }
  td { padding: 12px; border-bottom: 1px solid #f1f5f9; }

  .action-btn {
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid #e2e8f0;
    cursor: pointer;
    font-weight: 700;
    background: white;
    font-size: 12px;
  }

  .toast {
    position: fixed;
    top: 100px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--brand-dark);
    color: white;
    padding: 10px 24px;
    border-radius: 10px;
    opacity: 0;
    transition: 0.3s;
    z-index: 10000;
    font-weight: 700;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }
</style>
</head>

<body>

<div class="version-tag">v1.8.5</div>

<div class="sticky-wrapper">
  <div class="header-container">
    <div class="top-row">
      <div class="user-options">
        <label class="toggle-container">
          <input type="checkbox" id="hideOthersToggle"
            onchange="document.body.classList.toggle('hide-others')">
            🔒 Hide Others
        </label>
        <label class="toggle-container">
          <input type="checkbox" id="condensedToggle" onchange="buildCalendar()">
          ✨ Simplify View
        </label>
      </div>

      <button class="action-btn mgmt-btn" onclick="setStartDate()">📅 Start Date</button>
      <button class="action-btn mgmt-btn"
        style="background:#f8fafc; border:1px solid #cbd5e1"
        onclick="document.getElementById('csvUpload').click()">📂 Upload CSV</button>
      <input type="file" id="csvUpload" accept=".csv" style="display:none" onchange="importCSV(event)">
      <button class="action-btn"
        style="background:var(--brand-dark); color:white; border:none"
        onclick="exportData()">Download CSV</button>
    </div>
  </div>

  <div class="name-bar" id="nameBar">
    <button class="name-btn mgmt-btn"
      style="background:var(--brand-dark); color:white"
      onclick="addStaffPrompt()">+ ADD STAFF</button>
  </div>
</div>

<div class="calendar-container">
  <div class="calendar" id="calendar"></div>
</div>

<div class="table-section">
  <h3 style="margin:0;font-size:16px">Unit Master List</h3>
  <div class="table-container">
    <table id="masterTable">
      <thead>
        <tr><th>Date</th><th>Type</th><th>Staff Name</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let START_DATE = localStorage.getItem('canvas_start_date') || "2026-05-11";
const CORE_IDS = ['Charge-0','Day-0','Day-1','Night-0','Night-1'];

let currentUser = null;
let staffList = JSON.parse(localStorage.getItem('org_staff')) || [];
let shiftsData = JSON.parse(localStorage.getItem('org_shifts')) || [];

/* ✅ SORTED BY PICK ORDER, ZERO PICKS ALPHA */
function renderNames() {
  const bar = document.getElementById("nameBar");
  bar.innerHTML =
    `<button class="name-btn mgmt-btn"
      style="background:var(--brand-dark); color:white"
      onclick="addStaffPrompt()">+ ADD STAFF</button>`;

  const firstPickIndex = {};
  shiftsData.forEach((s, i) => {
    if (firstPickIndex[s.name] === undefined) {
      firstPickIndex[s.name] = i;
    }
  });

  const sorted = [...staffList].sort((a, b) => {
    const aP = firstPickIndex[a] !== undefined;
    const bP = firstPickIndex[b] !== undefined;

    if (aP && bP) return firstPickIndex[a] - firstPickIndex[b];
    if (aP) return -1;
    if (bP) return 1;
    return a.localeCompare(b);
  });

  sorted.forEach(n => {
    const c = shiftsData.filter(s => s.name === n).length;
    const btn = document.createElement("button");
    btn.className = "name-btn" + (currentUser === n ? " active-user" : "");
    btn.innerHTML = `${n} <span>(${c}/20)</span>`;
    btn.onclick = () => {
      currentUser = currentUser === n ? null : n;
      renderNames();
    };
    bar.appendChild(btn);
  });
}

function addStaffPrompt() {
  const n = prompt("Name:");
  if (n && !staffList.includes(n)) {
    staffList.push(n);
    localStorage.setItem('org_staff', JSON.stringify(staffList));
    currentUser = n;
    renderNames();
  }
}

renderNames();
</script>

</body>
</html>
