<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit Schedule Organizer</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 10px; background: #f0f2f5; color: #1e293b; }
  .header-container { display: flex; flex-direction: column; gap: 10px; border-bottom: 1px solid #ddd; padding-bottom: 15px; margin-bottom: 15px; }
  .top-row { display: flex; gap: 10px; flex-wrap: wrap; }
  
  .name-bar { display:flex; flex-wrap:wrap; gap:8px; justify-content:flex-start; margin-bottom:15px; }
  .name-btn { padding:8px 14px; border:1px solid #ccc; border-radius:20px; background:white; color: #334155; cursor:pointer; transition: 0.2s; font-weight: 500; }
  .name-btn.active-user { background: #007bff; color: white; border-color: #0056b3; box-shadow: 0 0 0 3px rgba(0,123,255,0.3); }
  .name-btn.completed { background: #fef08a; color: #713f12; border-color: #eab308; }
  .name-btn.register { background:#28a745; color:white; border-color:#28a745; font-weight: 700; }
  
  .user-status-card { display:none; background:white; padding:15px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.1); margin-bottom:20px; border-left: 5px solid #007bff; max-width: fit-content; }
  
  .calendar-wrapper { overflow-x: auto; padding-bottom: 10px; width: 100%; }
  .calendar { display: grid; grid-template-columns: repeat(7, minmax(140px, 1fr)); gap: 48px 10px; min-width: 1000px; padding-top: 15px; }
  @media (min-width: 1200px) { .calendar { grid-template-columns: repeat(14, minmax(125px, 1fr)); min-width: 1800px; } }
  
  .day { border: 1px solid #ddd; padding: 8px; border-radius: 8px; min-height: 200px; display: flex; flex-direction: column; background: white; }
  .date-title { font-weight:bold; font-size:14px; color: #333; margin-bottom: 4px; border-bottom:1px solid #eee; padding-bottom:4px; }
  
  .slot { border:1px solid #eee; padding:6px; background:#f8f9fa; margin-bottom:5px; border-radius:4px; cursor:pointer; font-size:11px; transition: 0.2s; height: 28px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; user-select: none; }
  .slot.filled { background:#cbd5e1; color:#334155; border-color:#94a3b8; cursor: not-allowed; }
  .slot.filled.mine { background:#007bff; color:white; border-color:#0056b3; cursor: pointer; }
  
  .tables-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 40px; }
  @media (max-width: 800px) { .tables-container { grid-template-columns: 1fr; } }
  
  .data-section { padding: 20px; background: white; border-radius: 12px; border: 1px solid #ddd; }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
  th, td { border: 1px solid #eee; padding: 8px; text-align: left; }
  th { background: #f8f9fa; color: #64748b; }
  
  .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #ef4444; color: white; padding: 12px 24px; border-radius: 50px; opacity: 0; transition: 0.3s; z-index: 10000; pointer-events: none; font-weight: bold; text-align: center; }
  .toast.show { opacity: 1; top: 30px; }
  
  .action-btn { padding: 8px 16px; border-radius: 6px; border: 1px solid #ddd; cursor: pointer; font-weight: bold; background: white; }
  .btn-download { background: #0f172a; color: white; border: none; }
</style>
</head>
<body>

<div class="header-container">
  <div class="top-row">
    <button class="action-btn btn-download" onclick="exportData()">💾 Download CSV</button>
    <button class="action-btn" style="color: #ef4444" onclick="refineData()">🔄 Refine Picks</button>
    <button class="action-btn" style="color: #64748b" onclick="resetApp()">🧹 Factory Reset</button>
  </div>
  <p style="font-size: 11px; color: #64748b; margin: 0;">Single click to pick/unpick. Double-click to correct/swap.</p>
</div>

<div class="name-bar" id="nameBar">
  <button class="name-btn register" onclick="addStaffPrompt()">+ Add Staff Member</button>
</div>

<div class="user-status-card" id="userStatusCard">
  <div style="display:flex; justify-content: space-between; align-items: center; gap: 20px;">
    <span>Acting as: <strong id="currentUserName" style="color:#007bff;"></strong></span>
    <button onclick="logout()" style="padding:2px 8px; cursor:pointer;">Switch User</button>
  </div>
</div>

<h2 id="headerTitle">Schedule Canvas</h2>
<div class="calendar-wrapper"><div class="calendar" id="calendar"></div></div>

<div class="tables-container">
  <div class="data-section">
    <h3>Staff List</h3>
    <table id="staffTable">
      <thead><tr><th>Name</th><th>Shifts</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
  <div class="data-section">
    <h3>Export Preview</h3>
    <table id="dataTable">
      <thead><tr><th>Date</th><th>Slot</th><th>Name</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SLOTS = ["Charge", "Day", "Day", "Day", "Night", "Night"];
const START_DATE = "2024-05-13"; 
const DAYS_COUNT = 42;

let currentUser = null;
let staffList = JSON.parse(localStorage.getItem('org_staff')) || [];
let shiftsData = JSON.parse(localStorage.getItem('org_shifts')) || [];

function init() {
  renderNames();
  buildCalendar();
  shiftsData.forEach(s => applyUI(s.date, s.slotId, s.slotName, s.name, true));
  updateTables();
}

function buildCalendar() {
  const container = document.getElementById("calendar");
  container.innerHTML = "";
  const start = new Date(START_DATE.replace(/-/g, '/'));
  for (let i = 0; i < DAYS_COUNT; i++) {
    const dt = new Date(start.getFullYear(), start.getMonth(), start.getDate() + i);
    const ds = dt.toISOString().split('T')[0];
    const cell = document.createElement("div");
    cell.className = "day";
    cell.innerHTML = `<div class="date-title">${dt.toDateString().slice(0, 10)}</div>`;
    SLOTS.forEach((sn, idx) => {
      const el = document.createElement("div");
      el.className = "slot";
      el.textContent = sn;
      Object.assign(el.dataset, { date: ds, slotId: `${sn}-${idx}`, slotName: sn, owner: "" });
      
      // Standard click for picking
      el.onclick = () => handleAction(el, false);
      // Double click for "Correction"
      el.ondblclick = () => handleAction(el, true);
      
      cell.appendChild(el);
    });
    container.appendChild(cell);
  }
}

function handleAction(el, isCorrection) {
  if (!currentUser) return toast("Select a user name first!", "#1e293b");
  
  const { date, slotId, slotName, owner } = el.dataset;

  // 1. Logic for REMOVING/UNPICKING
  if (owner === currentUser) {
    applyUI(date, slotId, slotName, currentUser, false);
    shiftsData = shiftsData.filter(s => !(s.date === date && s.slotId === slotId));
    saveAndRefresh();
    return;
  }

  // 2. Logic for BLOCKING standard click on taken slots
  if (owner !== "" && !isCorrection) {
    return toast(`❌ Taken by ${owner}. Double-click to correct.`);
  }

  // 3. Logic for PICKING / CORRECTING
  // Find "Gravity" slot: If user picks a Day, find the first available Day slot on that date
  let targetEl = el;
  if (!isCorrection) {
      const availableSameType = Array.from(document.querySelectorAll(`.slot[data-date="${date}"][data-slot-name="${slotName}"]`))
          .find(s => s.dataset.owner === "");
      if (availableSameType) targetEl = availableSameType;
  }

  const finalSlotId = targetEl.dataset.slotId;
  const finalSlotName = targetEl.dataset.slotName;

  // Constraint Checks
  if (shiftsData.some(s => s.name === currentUser && s.date === date)) {
      return toast("❌ Already have a shift on this date.");
  }
  if (finalSlotName !== "Night" && checkNightTurnaround(date)) {
      return toast("❌ Error: Cannot pick Day/Charge after a Night shift.");
  }
  if (checkTypeLimit(date, finalSlotName)) {
      return toast(`❌ Error: Max 3 consecutive ${finalSlotName}s.`);
  }
  if (checkGlobalLimit(date)) {
      return toast("❌ Error: Max 4 shifts in a row total.");
  }

  // If double-click correction, remove the old owner
  if (isCorrection && owner !== "") {
      shiftsData = shiftsData.filter(s => !(s.date === date && s.slotId === finalSlotId));
  }

  applyUI(date, finalSlotId, finalSlotName, currentUser, true);
  shiftsData.push({ date, slotId: finalSlotId, slotName: finalSlotName, name: currentUser });
  saveAndRefresh();
}

function saveAndRefresh() {
  localStorage.setItem('org_shifts', JSON.stringify(shiftsData));
  updateTables();
}

function checkNightTurnaround(targetDate) {
    const prevDate = getOffsetDate(new Date(targetDate.replace(/-/g, '/')), -1);
    return shiftsData.some(s => s.name === currentUser && s.date === prevDate && s.slotName === "Night");
}

function checkGlobalLimit(targetDate) {
    const hasShiftOn = (dateStr) => shiftsData.some(s => s.name === currentUser && s.date === dateStr);
    const date = new Date(targetDate.replace(/-/g, '/'));
    const offsets = [[-1,-2,-3,-4], [-1,-2,-3,+1], [-1,-2,+1,+2], [-1,+1,+2,+3], [+1,+2,+3,+4]];
    return offsets.some(set => set.every(o => hasShiftOn(getOffsetDate(date, o))));
}

function checkTypeLimit(targetDate, targetSlotName) {
    const isNight = (targetSlotName === "Night");
    const hasGroupOn = (dateStr) => shiftsData.some(s => {
        if (s.name !== currentUser || s.date !== dateStr) return false;
        return isNight ? (s.slotName === "Night") : (s.slotName !== "Night");
    });
    const date = new Date(targetDate.replace(/-/g, '/'));
    const offsets = [[-1,-2,-3], [-1,-2,+1], [-1,+1,+2], [+1,+2,+3]];
    return offsets.some(set => set.every(o => hasGroupOn(getOffsetDate(date, o))));
}

function getOffsetDate(baseDate, offset) {
    const d = new Date(baseDate);
    d.setDate(d.getDate() + offset);
    return d.toISOString().split('T')[0];
}

function applyUI(ds, id, sn, name, isAdd) {
  const el = document.querySelector(`.slot[data-date="${ds}"][data-slot-id="${id}"]`);
  if (!el) return;
  if (isAdd) {
    el.textContent = `${sn}: ${name}`;
    el.classList.add("filled");
    el.dataset.owner = name;
    if (name === currentUser) el.classList.add("mine");
  } else {
    el.textContent = sn;
    el.classList.remove("filled", "mine");
    el.dataset.owner = "";
  }
  refreshNameCounts();
}

function renderNames() {
  const b = document.getElementById("nameBar");
  const regBtn = b.querySelector('.register');
  b.innerHTML = ""; b.appendChild(regBtn);
  staffList.sort().forEach(name => {
    const btn = document.createElement("button");
    btn.className = "name-btn" + (currentUser === name ? " active-user" : "");
    btn.textContent = name;
    btn.onclick = () => selectUser(name);
    b.appendChild(btn);
  });
}

function selectUser(name) {
  currentUser = name;
  document.getElementById("userStatusCard").style.display = "block";
  document.getElementById("currentUserName").textContent = name;
  renderNames();
  document.querySelectorAll('.slot').forEach(el => {
    el.classList.remove("mine");
    if(el.dataset.owner === currentUser) el.classList.add("mine");
  });
}

function addStaffPrompt() {
    const n = prompt("Enter Full Name:");
    if (n && !staffList.includes(n)) {
        staffList.push(n);
        localStorage.setItem('org_staff', JSON.stringify(staffList));
        renderNames();
        updateTables();
    }
}

function updateTables() {
  const tbody = document.querySelector("#dataTable tbody");
  tbody.innerHTML = "";
  shiftsData.sort((a,b) => a.date.localeCompare(b.date)).forEach(s => {
    const row = tbody.insertRow();
    row.innerHTML = `<td>${s.date}</td><td>${s.slotName}</td><td>${s.name}</td>`;
  });
  const sBody = document.querySelector("#staffTable tbody");
  sBody.innerHTML = "";
  staffList.sort().forEach(name => {
    const count = shiftsData.filter(s => s.name === name).length;
    const row = sBody.insertRow();
    row.innerHTML = `<td>${name}</td><td>${count}</td>`;
  });
}

function refreshNameCounts() {
  const counts = {};
  shiftsData.forEach(s => counts[s.name] = (counts[s.name] || 0) + 1);
  document.querySelectorAll('.name-btn:not(.register)').forEach(btn => {
    const n = btn.textContent; const c = counts[n] || 0;
    if (c >= 20) btn.classList.add('completed'); else btn.classList.remove('completed');
  });
}

function exportData() {
  let csv = "Date,Slot,Name\n";
  shiftsData.sort((a,b) => a.date.localeCompare(b.date)).forEach(s => csv += `${s.date},${s.slotName},${s.name}\n`);
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = window.URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.setAttribute('href', url);
  a.setAttribute('download', `Schedule_Canvas_${new Date().toISOString().split('T')[0]}.csv`);
  a.click();
}

function refineData() { if(confirm("Clear all picks?")) { shiftsData = []; saveAndRefresh(); location.reload(); } }
function resetApp() { if(confirm("Factory Reset?")) { localStorage.clear(); location.reload(); } }
function logout() { currentUser = null; location.reload(); }
const toast = (m, bg = "#ef4444") => { const t = document.getElementById("toast"); t.style.background = bg; t.textContent = m; t.classList.add("show"); setTimeout(() => t.classList.remove("show"), 3500); };

document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
