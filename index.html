    --brand-dark: #1e293b;

  }

  /* --- styles unchanged --- */
</style>

<body>

<div class="version-tag">v1.8.5</div>

<!-- body unchanged -->

<script>
let START_DATE = localStorage.getItem('canvas_start_date') || "2026-05-11"; 
const CORE_IDS = ['Charge-0', 'Day-0', 'Day-1', 'Night-0', 'Night-1'];

let currentUser = null;
let staffList = JSON.parse(localStorage.getItem('org_staff')) || [];
let shiftsData = JSON.parse(localStorage.getItem('org_shifts')) || [];
let ACTIVE_HOLIDAYS = {};

/* ===== ALL EXISTING FUNCTIONS UNCHANGED ===== */

/* ✅ UPDATED NAME SORTING LOGIC */
function renderNames() {
  const bar = document.getElementById("nameBar");
  bar.innerHTML = `
    <button class="name-btn mgmt-btn"
      style="background:var(--brand-dark); color:white;"
      onclick="addStaffPrompt()">+ ADD STAFF</button>
  `;

  // Capture first time each staff ever picked
  const firstPickIndex = {};
  shiftsData.forEach((s, idx) => {
    if (firstPickIndex[s.name] === undefined) {
      firstPickIndex[s.name] = idx;
    }
  });

  const sortedStaff = [...staffList].sort((a, b) => {
    const aPicked = firstPickIndex[a] !== undefined;
    const bPicked = firstPickIndex[b] !== undefined;

    // Both picked → order by first pick time
    if (aPicked && bPicked) {
      return firstPickIndex[a] - firstPickIndex[b];
    }

    // One picked → picked comes first
    if (aPicked) return -1;
    if (bPicked) return 1;

    // Neither picked → alphabetical
    return a.localeCompare(b);
  });

  sortedStaff.forEach(name => {
    const count = shiftsData.filter(s => s.name === name).length;
    const btn = document.createElement("button");

    btn.className = "name-btn" + (currentUser === name ? " active-user" : "");
    btn.innerHTML = `${name} <span>(${count}/20)</span>`;

    btn.onclick = () => {
      if (currentUser === name) logout();
      else currentUser = name;
      saveAndRefresh();
    };

    bar.appendChild(btn);
  });
}

/* ===== remainder unchanged ===== */

window.onresize = () => buildCalendar();
document.addEventListener("DOMContentLoaded", init);
</script>

</body>
</html>
